spring:
  application:
    name: peca-service

  config:
    import: "optional:configserver:" # Ignorar o Config Server se não estiver disponível ou configurado

  cloud:
    config:
      enabled: false # Desabilita o Spring Cloud Config no profile local
    discovery:
      enabled: false # Desabilita descoberta de serviços no profile local

  netflix:
    eureka:
      client:
        register-with-eureka: false # Não se registra no Eureka
        fetch-registry: false # Não tenta buscar o registro do Eureka

  datasource:
    url: jdbc:postgresql://localhost:5434/peca_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

scalar:
  enabled: true
  url: http://localhost:8082/v3/api-docs
  path: /doc
  theme: deep_space
  dark-mode: true

server:
  port: 8082 # Definindo uma porta fixa para o local para não conflitar com outros se rodarem

