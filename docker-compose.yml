services:
  discovery-server:
    build:
      context: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  estudante-db:
    image: postgres:16-alpine
    container_name: estudante-db
    environment:
      POSTGRES_DB: estudante_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - estudante-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d estudante_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  curso-db:
    image: postgres:16-alpine
    container_name: curso-db
    environment:
      POSTGRES_DB: curso_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - curso-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d curso_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  matricula-db:
    image: postgres:16-alpine
    container_name: matricula-db
    environment:
      POSTGRES_DB: matricula_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - matricula-db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d matricula_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  estudante-service:
    build:
      context: ./estudante-service
    container_name: estudante-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://estudante-db:5432/estudante_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      discovery-server:
        condition: service_healthy
      estudante-db:
        condition: service_healthy

  curso-service:
    build:
      context: ./curso-service
    container_name: curso-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://curso-db:5432/curso_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      discovery-server:
        condition: service_healthy
      curso-db:
        condition: service_healthy

  matricula-service:
    build:
      context: ./matricula-service
    container_name: matricula-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://matricula-db:5432/matricula_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      discovery-server:
        condition: service_healthy
      matricula-db:
        condition: service_healthy
      estudante-service:
        condition: service_started
      curso-service:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      estudante-service:
        condition: service_started
      curso-service:
        condition: service_started
      matricula-service:
        condition: service_started

volumes:
  estudante-db-data:
  curso-db-data:
  matricula-db-data:
