spring:
  application:
    name: estudante-service

  datasource:
    url: jdbc:h2:file:./data/estudantedb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8081

scalar:
  enabled: true
  url: http://localhost:8081/v3/api-docs
  dark-mode: true
  path: /docs
  theme: deep_space