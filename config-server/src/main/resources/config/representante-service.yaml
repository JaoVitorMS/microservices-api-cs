server:
  port: 8083

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/representante_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
            logger-level: basic
          peca-service:
            connect-timeout: 3000
            read-timeout: 5000
          cliente-service:
            connect-timeout: 3000
            read-timeout: 5000
  main:
    allow-bean-definition-overriding: true

integration:
  services:
    peca:
      name: peca-service
      endpoints:
        disponiveis: /pecas/disponiveis
    cliente:
      name: cliente-service
      endpoints:
        disponiveis: /clientes/disponiveis

scalar:
  enabled: true
  url: /v3/api-docs
  dark-mode: true
  path: /docs
  theme: deep_space
