spring:
  application:
    name: matricula-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/matricula_db}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
            logger-level: basic
          curso-service:
            connect-timeout: 3000
            read-timeout: 5000
          estudante-service:
            connect-timeout: 3000
            read-timeout: 5000

  main:
    allow-bean-definition-overriding: true

integration:
  services:
    curso:
      name: curso-service
      endpoints:
        disponiveis: /cursos/disponiveis
    estudante:
      name: estudante-service
      endpoints:
        disponiveis: /estudantes/disponiveis
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8083

scalar:
  enabled: true
  url: http://localhost:8083/v3/api-docs
  dark-mode: true
  path: /docs
  theme: deep_space