spring:
  application:
    name: matricula-service

  datasource:
    url: jdbc:h2:file:./data/matriculadb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
  cloud:
    openfeign:
      client:
        config:
            default:
                connect-timeout: 5000
                read-timeout: 5000
                logger-level: full
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8083