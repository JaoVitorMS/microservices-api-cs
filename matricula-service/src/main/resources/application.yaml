spring:
  application:
    name: matricula-service

  datasource:
    url: jdbc:h2:file:./data/matriculadb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
            logger-level: basic
          curso-service:
            connect-timeout: 3000
            read-timeout: 5000
          estudante-service:
            connect-timeout: 3000
            read-timeout: 5000

  main:
    allow-bean-definition-overriding: true

integration:
  services:
    curso:
      name: curso-service
      endpoints:
        disponiveis: /cursos/disponiveis
    estudante:
      name: estudante-service
      endpoints:
        disponiveis: /estudantes/disponiveis
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8083

scalar:
  enabled: true
  url: http://localhost:8083/v3/api-docs
  dark-mode: true
  path: /docs
  theme: deep_space